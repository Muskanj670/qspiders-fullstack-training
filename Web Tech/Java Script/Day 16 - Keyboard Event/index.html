<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard Events</title>
  </head>
  <body>
    <h1>Keyboard Events</h1>
    <p>
      Keyboard events are actions triggered by the user pressing or releasing
      keys on the keyboard, which the browser captures and allows JS to respond
      to.
    </p>
    <ul>
      <li><strong>Keydown </strong> A key is pressed down.</li>
      <li><strong>Keyup </strong> A key is released.</li>
    </ul>

    <div><strong>Online / Offline Events</strong></div>
    <h2>Online/ Offline status</h2>
    <div id="status"></div>

    <script src="./script.js"></script>
  </body>
</html>
