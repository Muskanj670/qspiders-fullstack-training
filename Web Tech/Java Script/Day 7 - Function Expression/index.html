<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expression Function</title>
  </head>
  <body>
    <h1>Expression Function</h1>
    <div>
      <p>
        Functions treated as values - can be assigned to variables, passed as
        arguments, and returned from other function.
      </p>
    </div>
    <pre>
        const greed = function(){
            console.log("Namaste")
        }

        const x = greed()
        console.log(x)   <!--- Undefined-->>
    </pre>
    <script src="./script.js"></script>
  </body>
</html>
