<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Shadow</title>
    <style>
        div{
            margin: 5px;
            box-shadow: 5px 5px 50px 50px lightcoral;
            border-radius: 5px;
            padding: 5px 8px;
            background-color: black;
            color: white;
        }
    </style>
  </head>
  <body>
    <div>
      <h1>Understanding Box Shadow</h1>
      <p>
        box-shadow:
        <span style="text-decoration: underline; text-underline-offset: 4px;"
          >x-offset y-offset blur-radius spread-radius color of shadow
        </span>
      </p>
    </div>
  </body>
</html>
