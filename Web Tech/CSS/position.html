<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Properties</title>
    <link rel="stylesheet" href="./position.css">
</head>
<body>
    <header>
        <div class="center-container">
            <nav>
                <div class="logo">
                    <a href="#">LOGO</a>
                </div>
                <div class="navbar">
                    <a href="#about">About</a>
                    <a href="contact">Contact</a>
                </div>
            </nav>
        </div>
    </header>
    <div class="info">
        <div class="main">
            <strong>position: </strong>
            <ol>
                <li>static</li>
                <li>relative</li>
                <li>absolute</li>
                <li>fixed</li>
                <li>sticky</li>
            </ol>
        </div>
        <div class="sub">
            <ol>
                <li>top: </li>
                <li>right: </li>
                <li>bottom: </li>
                <li>left: </li>
                <li>z-index: </li>
            </ol>
        </div>
    </div>
</body>
</html>
