<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedbacks</title>
  </head>
  <body>
    <a href="{% url 'home' %}"><button>Home</button></a>
    <h1>All Feedbacks</h1>
    <form method="get">
      <input
        type="text"
        name="search"
        id="search"
        placeholder="Search by name"
      />
      <button type="submit">Search</button>
    </form>
    <a href="{% url 'feedback' %}"><button>Refresh</button></a>
    <table border="2" cellpadding="5">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Feedback</th>
      </tr>
      {% for feed in feedbacks %}
      <tr>
        <td>{{ feed.id }}</td>
        <td>{{ feed.name }}</td>
        <td>{{ feed.feedback }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
