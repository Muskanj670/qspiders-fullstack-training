{% extends 'article/home.html' %} {% block content %}
<div class="article-detail">
  <h1>{{ article.title|title }}</h1>

  <p class="content">{{ article.content }}</p>

  <p><strong>Author:</strong> {{ article.author }}</p>
  <p><strong>Created:</strong> {{ article.created_at }}</p>
  <p><strong>Last Updated:</strong> {{ article.updated_at }}</p>

  <div class="buttons">
    <a href="{% url 'update_article' article.id %}">
      <button class="update-btn">Update</button>
    </a>

    <a href="{% url 'delete' article.id %}">
      <button class="delete-btn">Delete</button>
    </a>
  </div>
</div>
{% endblock %}
