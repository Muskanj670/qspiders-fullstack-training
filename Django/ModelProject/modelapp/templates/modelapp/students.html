<!doctype html>
<html>
  <head>
    <title>Students</title>
  </head>
  <body>
    <h1>Student List</h1>
    <table border="1", cellpadding = 6>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Roll</th>
        <th>Subject</th>
        <th>Email</th>
        <th>Address</th>
      </tr>

      {% for student in students %}
      <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.roll }}</td>
        <td>{{ student.subject }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.address }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
