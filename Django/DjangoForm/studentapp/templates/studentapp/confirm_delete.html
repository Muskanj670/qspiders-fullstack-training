<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Delete</title>
  </head>
  <body>
    <p>Are you sure you want to delete student data named {{data.name}} ?</p>
    <form action="" method="post">
      {% csrf_token %}
      <button>Yes</button>
      <button><a href="{% url 'all' %}">No</a></button>
    </form>
  </body>
</html>
